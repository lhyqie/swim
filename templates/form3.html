<!DOCTYPE html>
<html>
  <head>
    <title>Swimmers vs Time Standards</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='table.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.4"></script>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body class="score-page discovery-page">
    <main class="score-shell discovery-shell">
      <header class="score-header">
        <div>
          <p class="score-kicker">SwimHub</p>
          <h1 id="banner">Compare Swimmers</h1>
        </div>
        <nav class="score-actions">
          <a href="/search" id="tosearch" class="score-button score-button-primary">Single Swimmer</a>
        </nav>
      </header>

      <section class="compare-grid">
        <div class="discovery-panel compare-picker">
          <label class="control-field discovery-search">
            <span>Search</span>
            <input
              id="searchbox"
              type="text"
              class="input"
              placeholder="Search swimmer name or team"
              name="q"
              hx-get="/swimmer_selector"
              hx-vals='{"format": "list"}'
              hx-trigger="keyup changed delay:500ms"
              hx-target="#swimmer_selector"
              autofocus>
          </label>
          <label class="control-field discovery-search">
            <span>Result</span>
            <select class="compare-select" id="swimmer_selector">
              <option value="unset">Search to populate</option>
            </select>
          </label>
          <button type="button" class="score-button score-button-success" onclick="addRow()">Add Swimmer</button>
        </div>

        <div class="selected-panel">
          <div class="panel-heading">
            <h2>Selected Swimmers</h2>
          </div>
          <table class="results-table selected-table" id="tableOne">
            <thead>
                <tr>
                  <th>ID</th>
                  <th>Swimmer</th>
                  <th></th>
                </tr>
            </thead>
            <tbody id="selected_swimmers">
              <tr class="empty-row" id="selected_empty">
                <td colspan="3">No swimmers selected yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="settings-panel">
        <label class="control-field">
          <span>{{ form.timestandard.label.text }}</span>
          {{ form.timestandard(class_="compare-select") }}
        </label>
        <label class="control-field">
          <span>{{ form.nationaltime.label.text }}</span>
          {{ form.nationaltime(class_="compare-select") }}
        </label>
        <button type="button" class="score-button score-button-primary" onclick="displayData()">Display Board</button>
      </section>
    </main>

    <script>
      var table = document.getElementById("tableOne");
      var tableBody = document.getElementById("selected_swimmers");
      var emptyRow = document.getElementById("selected_empty");
      var tableData = [];

      function addRow() {
        var selector = document.getElementById("swimmer_selector");
        var selected = selector.options[selector.selectedIndex];
        if (!selected || selected.value == "unset") {
          alert("First search swimmer, then select from the list.");
          return;
        }

        var swimmerId = selected.value;
        for (let k = 0; k < tableData.length; k++) {
          if (tableData[k][0] == swimmerId) {
            alert("Swimmer is already selected.");
            return;
          }
        }

        if (emptyRow) {
          emptyRow.remove();
          emptyRow = null;
        }

        var swimmerName = selected.dataset.name || selected.textContent.trim();
        var swimmerMeta = selected.dataset.meta || "";
        var swimmerTeam = selected.dataset.team || "";
        var rowData = [swimmerId, swimmerName];
        var row = document.createElement("tr");

        var idCell = document.createElement("td");
        idCell.dataset.label = "ID";
        idCell.innerHTML = swimmerId;
        row.appendChild(idCell);

        var nameCell = document.createElement("td");
        nameCell.dataset.label = "Swimmer";
        var nameSpan = document.createElement("span");
        nameSpan.className = "selected-name";
        nameSpan.textContent = swimmerName;
        var metaSpan = document.createElement("span");
        metaSpan.className = "selected-meta";
        metaSpan.textContent = swimmerMeta + (swimmerTeam ? " - " + swimmerTeam : "");
        nameCell.appendChild(nameSpan);
        nameCell.appendChild(metaSpan);
        row.appendChild(nameCell);

        var actionCell = document.createElement("td");
        var deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.textContent = "Remove";
        deleteBtn.className = "score-button score-button-danger score-button-compact";
        deleteBtn.onclick = function() { deleteRow(row); };
        actionCell.appendChild(deleteBtn);
        row.appendChild(actionCell);

        tableBody.appendChild(row);
        tableData.push(rowData);
      }

      function deleteRow(row) {
        var rowIndex = row.rowIndex - 1;
        row.remove();
        tableData.splice(rowIndex, 1);
        if (tableData.length == 0) {
          emptyRow = document.createElement("tr");
          emptyRow.className = "empty-row";
          emptyRow.id = "selected_empty";
          emptyRow.innerHTML = '<td colspan="3">No swimmers selected yet.</td>';
          tableBody.appendChild(emptyRow);
        }
      }

      function displayData() {
        var ids = [];
        for (var i = 0; i < tableData.length; i++) {
          ids.push(tableData[i][0]);
        }
        if (ids.length == 0) {
          alert("Add at least one swimmer.");
          return;
        }
        var url = window.location.origin + "/board?id="+ids.join(",");
        var ts = document.getElementById("timestandard").value;
        var nt = document.getElementById("nationaltime").value;
        if (ts.length > 0) {
          url += "&ts="+ts
        }
        if (nt.length > 0) {
          url += "&nt="+nt
        }
        window.location.href = url;
      }
    </script>
  </body>
</html>

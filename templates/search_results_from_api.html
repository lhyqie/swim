{% if format == 'list' %}
    {% for result in results %}
    <option
      value="{{ result.slug }}"
      data-name="{{ result.name }}"
      data-meta="{{ result.sex }} - {{ result.age }}"
      data-team="{{ result.team }}">
      {{ result.name }} - {{ result.age }} {{ result.sex }} - {{ result.team }}
    </option>
    {% else %}
    <option value="unset">No matches</option>
    {% endfor %}

{% else %}

    {% for result in results %}
    <tr>
        <td data-label="Swimmer">
          <a class="result-name" href="/card?id={{ result.slug }}">{{ result.name }}</a>
          <div class="result-id">{{ result.slug }}</div>
        </td>
        <td data-label="Team">{{ result.team }}</td>
        <td data-label="Age">{{ result.age }}</td>
        <td data-label="Sex">{{ result.sex }}</td>
        <td><a class="score-button score-button-muted score-button-compact" href="/card?id={{ result.slug }}">Open</a></td>
    </tr>
    {% else %}
    <tr class="empty-row">
        <td colspan="5">No swimmers found.</td>
    </tr>
    {% endfor %}
{% endif %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimmer Search</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='table.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.4"></script>
</head>
<body class="score-page discovery-page">
  <main class="score-shell discovery-shell">
    <header class="score-header">
      <div>
        <p class="score-kicker">SwimHub</p>
        <h1 id="banner">Find a Swimmer</h1>
      </div>
      <nav class="score-actions">
        <a href="/swimmer/" id="tocompare" class="score-button score-button-success">Compare Swimmers</a>
      </nav>
    </header>

    <section class="discovery-panel">
      <label class="control-field discovery-search">
        <span>Search</span>
        <input
          type="text"
          class="input"
          placeholder="Swimmer name"
          name="q"
          hx-get="/search_results_from_api"
          hx-trigger="keyup changed delay:500ms"
          hx-target="#results"
          hx-indicator="#spinner"
          autofocus>
      </label>
      <img width="42" id="spinner" class="htmx-indicator loader" src="{{ url_for('static',filename='infinite-spinner.svg') }}" />
    </section>

    <div class="results-wrap">
      <table class="results-table" id="tableOne">
        <thead>
          <tr>
            <th>Swimmer</th>
            <th>Team</th>
            <th>Age</th>
            <th>Sex</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="results">
          <tr class="empty-row">
            <td colspan="5">Start typing to search swimmers.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
